<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0b12" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f4f5fb" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="A modern, minimal todo app. Add, organize and track your tasks." />
  <title>Tasks — Modern To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%85%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <main class="app" role="main">
    <header class="app__header">
      <div class="brand">
        <div class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12.5 9 17.5 20 6" />
          </svg>
        </div>
        <div class="brand__text">
          <h1>Tasks</h1>
          <p id="dateLabel">Today</p>
        </div>
      </div>
      <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </header>

    <section class="progress-card" aria-live="polite">
      <div class="progress-card__info">
        <span class="progress-card__count"><strong id="doneCount">0</strong> of <span id="totalCount">0</span> done</span>
        <span class="progress-card__pct" id="pctLabel">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-bar__fill" id="progressFill"></div></div>
    </section>

    <form class="composer" id="todoForm" autocomplete="off">
      <input
        id="todoInput"
        class="composer__input"
        type="text"
        placeholder="Add a new task…"
        aria-label="Add a new task"
        maxlength="140"
        enterkeyhint="done"
        required
      />
      <button class="composer__add" type="submit" aria-label="Add task">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </form>

    <nav class="filters" id="filters" aria-label="Filter tasks">
      <button class="chip is-active" data-filter="all" type="button">All <span class="chip__num" data-count="all">0</span></button>
      <button class="chip" data-filter="active" type="button">Active <span class="chip__num" data-count="active">0</span></button>
      <button class="chip" data-filter="completed" type="button">Done <span class="chip__num" data-count="completed">0</span></button>
    </nav>

    <ul class="list" id="todoList" aria-label="Task list"></ul>

    <div class="empty" id="emptyState" hidden>
      <div class="empty__art" aria-hidden="true">🗂️</div>
      <p class="empty__title">Nothing here yet</p>
      <p class="empty__sub">Add your first task above to get started.</p>
    </div>

    <footer class="app__footer" id="appFooter" hidden>
      <span id="itemsLeft">0 items left</span>
      <button class="link-btn" id="clearCompleted" type="button">Clear completed</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
